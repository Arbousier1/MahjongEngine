# Detekt configuration for the Mahjong engine project.
# Start permissive: disable the noisiest rules that would flag hundreds of
# existing violations. Tighten incrementally as code is refactored.

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 200
  LongParameterList:
    active: true
    functionThreshold: 12
    constructorThreshold: 12
  ComplexCondition:
    active: true
    threshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 30
  TooManyFunctions:
    active: false
  LargeClass:
    active: true
    threshold: 600
  NestedBlockDepth:
    active: true
    threshold: 8

style:
  active: true
  MaxLineLength:
    active: false
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ReturnCount:
    active: false
  ThrowsCount:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  FunctionOnlyReturningConstant:
    active: false

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: false
  EmptyClassBlock:
    active: false

exceptions:
  active: true
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  FunctionNaming:
    active: false
  VariableNaming:
    active: false
  MatchingDeclarationName:
    active: false

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true

performance:
  active: true
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: false
