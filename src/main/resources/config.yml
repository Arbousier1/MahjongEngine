# MahjongPaper configuration
#
# The plugin snapshots this file during startup. Restart the server or plugin
# process after editing it so database, CraftEngine, and table persistence
# settings are all reloaded together.
#
# New grouped keys are preferred, but the code still accepts the older
# flat keys for backward compatibility.

database:
  # Set to false to disable round history persistence entirely.
  enabled: true

  # If true, the plugin disables itself when the database cannot initialize.
  failOnError: false

  connection:
    # Supported values: h2, mariadb, mysql
    type: h2

    # Used only for MariaDB/MySQL.
    host: 127.0.0.1
    port: 3306
    name: mahjongpaper

    # Extra JDBC query parameters for MariaDB/MySQL.
    parameters: useUnicode=true&characterEncoding=utf8&useSsl=false

  credentials:
    # Used only for MariaDB/MySQL.
    username: root
    password: change_me

  h2:
    # Relative paths are resolved against the plugin data folder.
    path: data/mahjongpaper
    username: sa
    password: ""
    parameters: MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

  pool:
    maxSize: 10
    minIdle: 2
    connectionTimeoutMillis: 10000

tables:
  # How many persistent tables are rebuilt per tick after startup.
  # Lower values reduce startup lag; higher values finish recovery sooner.
  startupRebuildBatchSize: 3

  # Allow players to dismount and move freely during an active round without
  # being treated as leaving the table. Turn this on if players need to walk
  # around for better visibility.
  allowFreeMoveDuringRound: false

  persistence:
    # Persistent tables are restored from this file on startup.
    enabled: true
    file: tables.yml

ranking:
  # Mahjong Soul-style rank points and rank persistence.
  # Requires database.enabled=true.
  enabled: true

  # Ranked room presets used for 4-player east-only and hanchan tables.
  # Supported: BRONZE, SILVER, GOLD, JADE, THRONE
  eastRoom: SILVER
  southRoom: GOLD

integrations:
  craftengine:
    # Export the bundled MahjongPaper CraftEngine pack on startup.
    exportBundleOnEnable: true

    bundle:
      folder: mahjongpaper

    compatibility:
      # Inject CraftEngine PacketEvents wrapped block-state mappings for anti-cheat stacks
      # (PacketEvents, GrimAC, Vulcan when compatible shaded classes are available).
      injectAntiCheatPacketEventsMappings: true

    items:
      # Prefer CraftEngine custom items for tile visuals when available.
      preferCustomItems: true

      # Legacy shared fallback prefix for CraftEngine tile item ids.
      # MahjongPaper appends the lowercase tile name automatically, such as east, m1, back, unknown,
      # or the GB flower ids plum, orchid, bamboo, chrysanthemum, spring, summer, autumn, winter.
      # Full tile suffix list:
      # m1 m2 m3 m4 m5 m5_red m6 m7 m8 m9
      # p1 p2 p3 p4 p5 p5_red p6 p7 p8 p9
      # s1 s2 s3 s4 s5 s5_red s6 s7 s8 s9
      # east south west north white_dragon green_dragon red_dragon
      # plum orchid bamboo chrysanthemum spring summer autumn winter
      # back unknown
      # Example: custom:tile_ -> custom:tile_east, custom:tile_m1, custom:tile_back, custom:tile_unknown
      # Example flower ids: custom:tile_plum, custom:tile_orchid, custom:tile_bamboo, custom:tile_winter
      # Variant-specific prefixes below override this value when set.
      tileItemIdPrefix: "mahjongpaper:"

      # CraftEngine item id prefix for Riichi tables.
      # Leave this equal to the shared prefix unless you want a dedicated Riichi tile pack.
      riichiTileItemIdPrefix: "mahjongpaper:"

      # CraftEngine item id prefix for GB tables.
      # This lets Riichi and GB tables use different CE item ids at the same time.
      gbTileItemIdPrefix: "mahjongpaper:"

      # If a resolved front-face item id is missing, MahjongPaper tries the same variant's
      # unknown tile item first, so incomplete packs can still render through CraftEngine.
      # If preferCustomItems is false, or CraftEngine item building is unavailable,
      # MahjongPaper falls back to its built-in direct item_model tile items.

    furniture:
      # Prefer CraftEngine furniture hitboxes for table and seat interaction.
      preferHitboxInteraction: true

      # CraftEngine furniture id used for the table visual.
      # Set to "" to use the built-in block-display table fallback instead.
      # When set, MahjongPaper uses that furniture as-is, including its own hitboxes and other behavior.
      # Leave it empty to use the built-in block-display table plus MahjongPaper's fallback table hitbox.
      tableFurnitureId: mahjongpaper:table_visual

      # CraftEngine furniture id used for each table seat.
      # Set to "" to use the built-in block-display chair fallback instead.
      # This furniture should define its own hitbox and seats in CraftEngine.
      seatFurnitureId: mahjongpaper:seat_chair

debug:
  enabled: false

  # Empty means all categories when debug is enabled.
  categories:
    - lifecycle
    - table
    - command
    - packet
    - render
    - database
