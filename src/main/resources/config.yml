database:
  enabled: true
  failOnError: false
  type: h2
  host: 127.0.0.1
  port: 3306
  name: mahjongpaper
  username: root
  password: change_me
  parameters: useUnicode=true&characterEncoding=utf8&useSsl=false
  h2:
    # Relative paths are resolved against the plugin data folder.
    path: data/mahjongpaper
    username: sa
    password: ""
    parameters: MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
  pool:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeoutMillis: 10000
debug:
  enabled: false
  categories:
    - lifecycle
    - table
    - command
    - packet
    - culling
    - render
    - database
clientOptimization:
  entityCulling:
    enabled: false
    intervalTicks: 2
    viewDistance: 48
    rateLimiting:
      enabled: true
      bucketSize: 64
      restorePerTick: 8
craftengine:
  exportBundleOnEnable: true
  preferCustomItems: true
  bundleFolder: mahjongpaper
