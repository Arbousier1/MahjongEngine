name: MahjongPaper
main: doublemoon.mahjongcraft.paper.MahjongPaperPlugin
version: ${version}
api-version: "1.21.11"
author: OpenAI
description: Riichi Mahjong Paper plugin rewrite built around display entities, item_model and PacketEvents.
depend:
  - packetevents
commands:
  mahjong:
    description: Manage MahjongPaper tables and rounds. Use /mahjong help for command explanations.
    usage: /mahjong <help|create|botmatch|mode|join|leave|list|spectate|unspectate|addbot|removebot|rule|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|render|clear>
    permission: mahjongpaper.command
permissions:
  mahjongpaper.command:
    default: true
