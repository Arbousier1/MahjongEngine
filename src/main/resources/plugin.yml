name: MahjongPaper
main: top.ellan.mahjong.bootstrap.MahjongPaperPlugin
version: ${version}
api-version: "1.21.11"
folia-supported: true
author: openai and ellan
website: top.ellan
description: Riichi Mahjong Paper plugin rewrite built around display entities, item_model and CraftEngine.
depend:
  - CraftEngine
commands:
  mahjong:
    description: Manage MahjongPaper tables and rounds. Use /mahjong help for command explanations.
    usage: /mahjong <help|create|botmatch|mode|join|leave|list|spectate|unspectate|addbot|removebot|rule|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|render|clear|forceend|deletetable|reload>
    permission: mahjongpaper.command
permissions:
  mahjongpaper.command:
    default: true
  mahjongpaper.admin:
    default: op

