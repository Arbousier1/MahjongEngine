command.usage=<yellow>用法:</yellow> <gray>/mahjong help|create|botmatch|mode|join|leave|list|spectate|unspectate|addbot|removebot|rule|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|render|clear|forceend|deletetable</gray>
command.help.create=<gray>/mahjong create</gray> <white>- 在你目前位置建立一張新牌桌。</white>
command.help.botmatch=<gray>/mahjong botmatch [hanchan|tonpuu]</gray> <white>- 建立並啟動一整桌 4 Bot 測試對局，然後自動進入觀戰。</white>
command.help.mode=<gray>/mahjong mode <MAJSOUL_TONPUU|MAJSOUL_HANCHAN|GB|SICHUAN></gray> <white>- 應用規則預設；主要玩法為雀魂風格立直，國標和四川為可選模式。</white>
command.help.join=<gray>/mahjong join <table_id></gray> <white>- 作為玩家加入已有牌桌。</white>
command.help.leave=<gray>/mahjong leave</gray> <white>- 離開目前牌桌，或退出觀戰。</white>
command.help.list=<gray>/mahjong list</gray> <white>- 查看所有活動牌桌及其位置。</white>
command.help.spectate=<gray>/mahjong spectate <table_id></gray> <white>- 以觀戰者身份進入牌桌，不佔座位。</white>
command.help.unspectate=<gray>/mahjong unspectate</gray> <white>- 退出目前觀戰的牌桌。</white>
command.help.addbot=<gray>/mahjong addbot</gray> <white>- 給空位補一個 Bot。</white>
command.help.removebot=<gray>/mahjong removebot</gray> <white>- 在開局前移除一個 Bot。</white>
command.help.rule=<gray>/mahjong rule [key] [value]</gray> <white>- 開啟規則介面，或在開局前修改單項規則。</white>
command.help.start=<gray>/mahjong start</gray> <white>- 切換準備狀態；4 個座位滿員且全部準備後自動開局。</white>
command.help.state=<gray>/mahjong state</gray> <white>- 查看目前牌桌和牌局狀態。</white>
command.help.riichi=<gray>/mahjong riichi <hand_index></gray> <white>- 宣告立直，並打出指定手牌索引的牌。僅限立直麻將。</white>
command.help.tsumo=<gray>/mahjong tsumo</gray> <white>- 在滿足條件時宣告自摸。</white>
command.help.ron=<gray>/mahjong ron</gray> <white>- 對他家打出的牌宣告榮和。</white>
command.help.pon=<gray>/mahjong pon</gray> <white>- 在目前反應窗口執行碰牌。</white>
command.help.minkan=<gray>/mahjong minkan</gray> <white>- 在目前反應窗口執行明槓。</white>
command.help.chii=<gray>/mahjong chii <tile_a> <tile_b></gray> <white>- 用手裡的兩張指定牌執行吃牌。</white>
command.help.kan=<gray>/mahjong kan <tile></gray> <white>- 用指定牌種宣告暗槓或加槓。</white>
command.help.skip=<gray>/mahjong skip</gray> <white>- 放棄目前可執行的反應操作。</white>
command.help.kyuushu=<gray>/mahjong kyuushu</gray> <white>- 宣告九種九牌流局。僅限立直麻將。</white>
command.help.settlement=<gray>/mahjong settlement</gray> <white>- 重新打開本桌最近一次結算界面。</white>
command.help.render=<gray>/mahjong render</gray> <white>- 強制刷新牌桌展示實體。</white>
command.help.clear=<gray>/mahjong clear</gray> <white>- 清除目前牌桌的展示實體。</white>
command.help.forceend=<gray>/mahjong forceend [table_id]</gray> <white>- 管理員：強制結束目前對局並讓桌子回到等待狀態。</white>
command.help.deletetable=<gray>/mahjong deletetable [table_id]</gray> <white>- 管理員：立即刪除目前或指定牌桌。</white>
