command.usage=<yellow>Usage:</yellow> <gray>/mahjong help|create|botmatch|mode|join|leave|list|spectate|unspectate|addbot|removebot|rule|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|rank|render|inspect|clear|forceend|deletetable</gray>
command.help.create=<gray>/mahjong create</gray> <white>- Create a new table at your position.</white>
command.help.botmatch=<gray>/mahjong botmatch [hanchan|tonpuu]</gray> <white>- Create and start a full 4-bot test match, then spectate it.</white>
command.help.mode=<gray>/mahjong mode <tonpuu|hanchan></gray> <white>- Apply a Mahjong Soul-style mode preset.</white>
command.help.join=<gray>/mahjong join <table_id></gray> <white>- Join an existing table as a player.</white>
command.help.leave=<gray>/mahjong leave</gray> <white>- Leave your current table or stop spectating.</white>
command.help.list=<gray>/mahjong list</gray> <white>- Show active tables and their locations.</white>
command.help.spectate=<gray>/mahjong spectate <table_id></gray> <white>- Watch a table without taking a seat.</white>
command.help.unspectate=<gray>/mahjong unspectate</gray> <white>- Stop spectating the current table.</white>
command.help.addbot=<gray>/mahjong addbot</gray> <white>- Fill one empty seat with a bot.</white>
command.help.removebot=<gray>/mahjong removebot</gray> <white>- Remove one bot before the round starts.</white>
command.help.rule=<gray>/mahjong rule [key] [value]</gray> <white>- View or change table rules before starting.</white>
command.help.start=<gray>/mahjong start</gray> <white>- Toggle ready; the round auto-starts when all 4 seats are ready.</white>
command.help.state=<gray>/mahjong state</gray> <white>- Show the current table and round state.</white>
command.help.riichi=<gray>/mahjong riichi <hand_index></gray> <white>- Declare riichi and discard the chosen tile index. Riichi tables only.</white>
command.help.tsumo=<gray>/mahjong tsumo</gray> <white>- Claim a self-draw win if your hand is ready.</white>
command.help.ron=<gray>/mahjong ron</gray> <white>- Claim a win on another player's discard.</white>
command.help.pon=<gray>/mahjong pon</gray> <white>- Call pon on the current reaction window.</white>
command.help.minkan=<gray>/mahjong minkan</gray> <white>- Call an open kan on the current reaction window.</white>
command.help.chii=<gray>/mahjong chii <tile_a> <tile_b></gray> <white>- Call chii with the listed two tiles from your hand.</white>
command.help.kan=<gray>/mahjong kan <tile></gray> <white>- Declare ankan or kakan with the given tile kind.</white>
command.help.skip=<gray>/mahjong skip</gray> <white>- Pass the current reaction opportunity.</white>
command.help.kyuushu=<gray>/mahjong kyuushu</gray> <white>- Declare nine terminals and honors abortive draw. Riichi tables only.</white>
command.help.settlement=<gray>/mahjong settlement</gray> <white>- Reopen the latest settlement UI for this table.</white>
command.help.rank=<gray>/mahjong rank</gray> <white>- Show your Mahjong Soul-style rank progress.</white>
command.help.render=<gray>/mahjong render</gray> <white>- Force a table display refresh.</white>
command.help.inspect=<gray>/mahjong inspect</gray> <white>- Show render anchors and stick directions with private debug particles.</white>
command.help.clear=<gray>/mahjong clear</gray> <white>- Remove current display entities for the table.</white>
command.help.forceend=<gray>/mahjong forceend [table_id]</gray> <white>- Admin: force-end the current match and return the table to waiting state.</white>
command.help.deletetable=<gray>/mahjong deletetable [table_id]</gray> <white>- Admin: delete the current or specified table immediately.</white>
