# MahjongPaper 配置文件
#
# 插件会在启动时读取并缓存这个文件。修改后请重启服务器或插件进程，
# 这样数据库、CraftEngine 和牌桌持久化设置才能一起重新加载。
#
# 现在更推荐使用新的分组键名，但代码仍兼容旧的扁平键名。

database:
  # 设为 false 可完全关闭对局历史持久化。
  enabled: true

  # 若为 true，则数据库初始化失败时插件会直接停用自身。
  failOnError: false

  connection:
    # 支持的值: h2, mariadb
    type: h2

    # 仅用于 MariaDB。
    host: 127.0.0.1
    port: 3306
    name: mahjongpaper

    # MariaDB 额外的 JDBC 查询参数。
    parameters: useUnicode=true&characterEncoding=utf8&useSsl=false

  credentials:
    # 仅用于 MariaDB。
    username: root
    password: change_me

  h2:
    # 相对路径会基于插件数据目录解析。
    path: data/mahjongpaper
    username: sa
    password: ""
    parameters: MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

  pool:
    maxSize: 10
    minIdle: 2
    connectionTimeoutMillis: 10000

tables:
  # 服务器启动后，每 tick 重建多少张持久化牌桌。
  # 数值越低越能减少启动卡顿，越高则恢复得更快。
  startupRebuildBatchSize: 3

  persistence:
    # 持久化牌桌会在启动时从这个文件恢复。
    enabled: true
    file: tables.yml

ranking:
  # 雀魂风格的段位分与段位持久化。
  # 需要 database.enabled=true。
  enabled: true

  # 四麻东风战和半庄战使用的排位房间预设。
  # 支持: BRONZE, SILVER, GOLD, JADE, THRONE
  eastRoom: SILVER
  southRoom: GOLD

integrations:
  craftengine:
    # 启动时导出内置的 MahjongPaper CraftEngine 资源包。
    exportBundleOnEnable: true

    bundle:
      folder: mahjongpaper

    items:
      # 可用时优先用 CraftEngine 自定义物品显示麻将牌。
      preferCustomItems: true

      # 用于解析所有麻将牌视觉所用 CraftEngine 物品 id 的前缀。
      # 这个配置只控制 CraftEngine 自定义物品；麻将牌本身仍通过 ItemDisplay 渲染，
      # 不会因为这里的配置改成逐张放置 CraftEngine 家具实体。
      # MahjongPaper 会自动拼接小写牌名，例如 east、m1、back、unknown，
      # 以及国麻花牌的 plum、orchid、bamboo、chrysanthemum、spring、summer、autumn、winter。
      # 完整后缀列表：
      # m1 m2 m3 m4 m5 m5_red m6 m7 m8 m9
      # p1 p2 p3 p4 p5 p5_red p6 p7 p8 p9
      # s1 s2 s3 s4 s5 s5_red s6 s7 s8 s9
      # east south west north white_dragon green_dragon red_dragon
      # plum orchid bamboo chrysanthemum spring summer autumn winter
      # back unknown
      # 背面牌统一使用 back，所以你只需要提供公共前缀，不需要把每张牌完整写一遍。
      # 例: custom:tile_ -> custom:tile_east、custom:tile_m1、custom:tile_back
      # 花牌例子: custom:tile_plum、custom:tile_orchid、custom:tile_bamboo、custom:tile_winter
      # 默认值 mahjongpaper: 会解析成 mahjongpaper:east、mahjongpaper:m1、
      # mahjongpaper:back 和 mahjongpaper:unknown 这样的物品 id。
      # 这是共享兼容前缀；下面的日麻/国麻专用前缀会优先覆盖它。
      tileItemIdPrefix: "mahjongpaper:"

      # 日麻牌桌使用的 CraftEngine 物品前缀。
      riichiTileItemIdPrefix: "mahjongpaper:"

      # 国标牌桌使用的 CraftEngine 物品前缀。
      gbTileItemIdPrefix: "mahjongpaper:"

      # 如果某张正面牌解析出的 CE 物品不存在，插件会先尝试对应规则集的
      # unknown 牌面物品，便于不完整资源包先临时显示。
      # 如果 preferCustomItems 为 false，或解析出的 CraftEngine 物品无法构建，
      # MahjongPaper 会回退到内置的 direct item_model 麻将牌物品。

    furniture:
      # 桌子和座位交互优先使用 CraftEngine 家具 hitbox。
      preferHitboxInteraction: true

      # 牌桌视觉使用的 CraftEngine 家具 id。
      # 设为 "" 时改用内置的 block-display 牌桌后备方案。
      # 设置后，MahjongPaper 会完整使用该家具自身的 hitbox 与其他行为。
      # 留空时，则使用内置 block-display 牌桌并补上 MahjongPaper 的回退桌面 hitbox。
      tableFurnitureId: mahjongpaper:table_visual

      # 每个座位使用的 CraftEngine 家具 id。
      # 设为 "" 时改用内置的 block-display 椅子后备方案。
      # 这个家具应当在 CraftEngine 中自行定义 hitbox 和 seats。
      seatFurnitureId: mahjongpaper:seat_chair
      protectedFurnitureIds: []

debug:
  enabled: false

  # 留空表示 debug 开启时输出所有分类。
  categories:
    - lifecycle
    - table
    - command
    - packet
    - render
    - database
