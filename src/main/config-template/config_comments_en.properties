header.title=MahjongPaper configuration
header.snapshot=The plugin snapshots this file during startup.
header.restart=Restart the server or plugin process after editing so changes are fully reloaded.
header.compat=Grouped keys are preferred; legacy flat keys are still accepted for compatibility.

database.enabled=Set false to disable persistence.
database.fail_on_error=If true, plugin startup fails when database initialization fails.
database.type=Supported values: h2, mariadb, mysql
database.host=Used only for MariaDB and MySQL.
database.parameters=Extra JDBC query parameters for MariaDB and MySQL.
database.credentials=Used only for MariaDB and MySQL.
database.h2.path=Relative paths are resolved against the plugin data folder.

tables.batch=How many persistent tables are rebuilt per tick after startup.
tables.free_move=Allow players to move freely during a round without being treated as leaving.
tables.persistence=Persistent tables are restored from this file on startup.

ranking.summary=Mahjong Soul-style rank points and persistence (requires database.enabled=true).
ranking.rooms=Supported room presets: BRONZE, SILVER, GOLD, JADE, THRONE

craftengine.export=Export bundled MahjongPaper CraftEngine assets on startup.
craftengine.compat=Inject anti-cheat PacketEvents mappings when compatible integrations are present.
craftengine.prefer_custom=Prefer CraftEngine custom items for tile visuals.
craftengine.tile_prefix=Shared fallback item id prefix. MahjongPaper appends lowercase tile names automatically.
craftengine.riichi_prefix=Item id prefix override for Riichi tables.
craftengine.gb_prefix=Item id prefix override for GB tables.
craftengine.fallback_unknown=If a front-face item id is missing, MahjongPaper falls back to the variant's unknown tile item.
craftengine.prefer_hitbox=Prefer CraftEngine furniture hitboxes for table and seat interaction.
craftengine.table_furniture=Furniture id for table visual. Set empty string to use built-in fallback.
craftengine.seat_furniture=Furniture id for seat visual. Set empty string to use built-in fallback.

debug.categories=Empty list means all categories when debug is enabled.
