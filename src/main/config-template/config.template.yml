# {{header.title}}
#
# {{header.snapshot}}
# {{header.restart}}
#
# {{header.compat}}

database:
  # {{database.enabled}}
  enabled: true

  # {{database.fail_on_error}}
  failOnError: false

  connection:
    # {{database.type}}
    type: h2

    # {{database.host}}
    host: 127.0.0.1
    port: 3306
    name: mahjongpaper

    # {{database.parameters}}
    parameters: useUnicode=true&characterEncoding=utf8&useSsl=false

  credentials:
    # {{database.credentials}}
    username: root
    password: change_me

  h2:
    # {{database.h2.path}}
    path: data/mahjongpaper
    username: sa
    password: ""
    parameters: MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

  pool:
    maxSize: 10
    minIdle: 2
    connectionTimeoutMillis: 10000

tables:
  # {{tables.batch}}
  startupRebuildBatchSize: 3

  # {{tables.free_move}}
  allowFreeMoveDuringRound: false

  persistence:
    # {{tables.persistence}}
    enabled: true
    file: tables.yml

ranking:
  # {{ranking.summary}}
  enabled: true

  # {{ranking.rooms}}
  eastRoom: SILVER
  southRoom: GOLD

integrations:
  craftengine:
    # {{craftengine.export}}
    exportBundleOnEnable: true

    bundle:
      folder: mahjongpaper

    compatibility:
      # {{craftengine.compat}}
      injectAntiCheatPacketEventsMappings: true

    items:
      # {{craftengine.prefer_custom}}
      preferCustomItems: true

      # {{craftengine.tile_prefix}}
      tileItemIdPrefix: "mahjongpaper:"

      # {{craftengine.riichi_prefix}}
      riichiTileItemIdPrefix: "mahjongpaper:"

      # {{craftengine.gb_prefix}}
      gbTileItemIdPrefix: "mahjongpaper:"

      # {{craftengine.fallback_unknown}}

    furniture:
      # {{craftengine.prefer_hitbox}}
      preferHitboxInteraction: true

      # {{craftengine.table_furniture}}
      tableFurnitureId: mahjongpaper:table_visual

      # {{craftengine.seat_furniture}}
      seatFurnitureId: mahjongpaper:seat_chair

debug:
  enabled: false

  # {{debug.categories}}
  categories:
    - lifecycle
    - table
    - command
    - packet
    - render
    - database
