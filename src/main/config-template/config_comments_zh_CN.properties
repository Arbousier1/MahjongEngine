header.title=MahjongPaper 配置文件
header.snapshot=插件会在启动时读取并缓存本文件。
header.restart=修改后请重启服务器或插件进程，确保配置完整生效。
header.compat=推荐使用分组键名；旧版扁平键名仍保留兼容。

database.enabled=设为 false 可关闭持久化。
database.fail_on_error=若为 true，数据库初始化失败会导致插件启动失败。
database.type=支持值: h2, mariadb, mysql
database.host=仅用于 MariaDB / MySQL。
database.parameters=MariaDB / MySQL 的额外 JDBC 参数。
database.credentials=仅用于 MariaDB / MySQL。
database.h2.path=相对路径会基于插件数据目录解析。

tables.batch=服务器启动后，每 tick 重建的持久化牌桌数量。
tables.free_move=允许玩家在对局中自由移动且不被视为离桌。
tables.persistence=启动时从该文件恢复持久化牌桌。

ranking.summary=雀魂风格段位分与持久化（需要 database.enabled=true）。
ranking.rooms=支持房间预设: BRONZE, SILVER, GOLD, JADE, THRONE

craftengine.export=启动时导出内置的 CraftEngine 资源包。
craftengine.compat=在兼容环境下注入反作弊 PacketEvents 映射。
craftengine.prefer_custom=优先使用 CraftEngine 自定义物品显示牌面。
craftengine.tile_prefix=共享前缀，插件会自动拼接小写牌名。
craftengine.riichi_prefix=日麻牌桌的前缀覆盖。
craftengine.gb_prefix=国标牌桌的前缀覆盖。
craftengine.fallback_unknown=若正面物品缺失，自动回退到该规则集的 unknown 物品。
craftengine.prefer_hitbox=优先使用 CraftEngine 家具 hitbox 进行交互。
craftengine.table_furniture=牌桌家具 id，留空则使用内置回退。
craftengine.seat_furniture=座椅家具 id，留空则使用内置回退。

debug.categories=为空时表示开启 debug 后输出所有分类。
