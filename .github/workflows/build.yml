name: Build

on:
  push:
    branches:
      - main
      - virtual-threads
      - feature/gb-mahjong
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew build -x test

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-paper-jars
          path: build/libs/*.jar
