name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests with coverage on Paper 1.20.1 baseline
        run: ./gradlew test jacocoTestReport "-PmahjongPaperDevBundle=1.20.1-R0.1-SNAPSHOT" "-PmahjongJavaToolchain=25" "-PmahjongJavaTarget=17"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mahjong-paper-test-reports
          path: |
            build/reports/tests/test/**
            build/test-results/test/**

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mahjong-paper-coverage-reports
          path: |
            build/reports/jacoco/test/html/**
            build/reports/jacoco/test/jacocoTestReport.xml
